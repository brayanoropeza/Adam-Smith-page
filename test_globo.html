<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OROMEX - GOOGLE EARTH STYLE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Outfit', sans-serif; }
        #controls { position: absolute; bottom: 30px; width: 100%; text-align: center; z-index: 100; }
        button { 
            padding: 12px 40px; background: rgba(255, 255, 255, 0.1); color: #fff; 
            border: 1px solid #fff; cursor: pointer; font-weight: bold; 
            letter-spacing: 2px; backdrop-filter: blur(5px); transition: 0.3s;
        }
        button:hover { background: #fff; color: #000; }
        #msg { position: absolute; top: 20px; width: 100%; text-align: center; color: #fff; font-size: 0.8rem; letter-spacing: 5px; pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="msg">SISTEMA: RENDERIZADO SATELITAL ALTA DEFINICIÓN</div>
    <div id="controls">
        <button onclick="toggleMorph()">VISTA: TIERRA 3D</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, globe, clouds, isGlobe = false;
        const positions = { flat: [], sphere: [] };
        let points;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // CARGAR TEXTURAS REALISTAS
            const loader = new THREE.TextureLoader();
            const earthTexture = loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
            const bumpMap = loader.load('https://unpkg.com/three-globe/example/img/earth-topology.png');
            const cloudsTexture = loader.load('https://unpkg.com/three-globe/example/img/earth-clouds.png');

            // 1. TIERRA SATELITAL
            const globeGeo = new THREE.SphereGeometry(6, 64, 64);
            const globeMat = new THREE.MeshPhongMaterial({
                map: earthTexture,
                bumpMap: bumpMap,
                bumpScale: 0.05,
                specularMap: bumpMap,
                specular: new THREE.Color('grey'),
                shininess: 10
            });
            globe = new THREE.Mesh(globeGeo, globeMat);
            scene.add(globe);

            // 2. NUBES REALISTAS
            const cloudsGeo = new THREE.SphereGeometry(6.1, 64, 64);
            const cloudsMat = new THREE.MeshPhongMaterial({
                map: cloudsTexture,
                transparent: true,
                opacity: 0.4
            });
            clouds = new THREE.Mesh(cloudsGeo, cloudsMat);
            scene.add(clouds);

            // 3. ATMÓSFERA AZUL (FRESNEL)
            const atmosGeo = new THREE.SphereGeometry(6.5, 64, 64);
            const atmosMat = new THREE.ShaderMaterial({
                uniforms: { color: { value: new THREE.Color(0x93cfef) } },
                vertexShader: `varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `varying vec3 vNormal; uniform vec3 color; void main() { float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 4.0); gl_FragColor = vec4(color, intensity); }`,
                side: THREE.BackSide, transparent: true, blending: THREE.AdditiveBlending
            });
            scene.add(new THREE.Mesh(atmosGeo, atmosMat));

            // 4. ESTRELLAS
            const starGeo = new THREE.BufferGeometry();
            const sPos = [];
            for(let i=0; i<3000; i++) { sPos.push((Math.random()-0.5)*400, (Math.random()-0.5)*400, (Math.random()-0.5)*400); }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(sPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 })));

            // LUCES (SOL)
            const ambient = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(10, 10, 15);
            scene.add(sun);

            animate();
        }

        window.toggleMorph = function() {
            isGlobe = !isGlobe;
            document.getElementById('msg').textContent = isGlobe ? "VISTA: SATELITAL 3D (GOOGLE EARTH STYLE)" : "VISTA: SATELITAL PLANA";
            
            if(isGlobe) {
                gsap.to(camera.position, { z: 18, duration: 2, ease: "power2.inOut" });
            } else {
                gsap.to(camera.position, { z: 25, duration: 2, ease: "power2.inOut" });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.001;
            clouds.rotation.y += 0.0012;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
